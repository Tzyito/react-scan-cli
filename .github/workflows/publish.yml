name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, do not publish)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Sync version from release tag
        if: github.event_name == 'release'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Publishing version: $VERSION"
          for pkg in packages/vite-plugin packages/runner packages/skills; do
            jq --arg v "$VERSION" '.version = $v' $pkg/package.json > /tmp/pkg.json
            mv /tmp/pkg.json $pkg/package.json
          done

      - name: Publish @react-scan-cli/vite-plugin
        if: ${{ !inputs.dry_run }}
        run: bun publish --access public
        working-directory: packages/vite-plugin
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @react-scan-cli/runner
        if: ${{ !inputs.dry_run }}
        run: bun publish --access public
        working-directory: packages/runner
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @react-scan-cli/skills
        if: ${{ !inputs.dry_run }}
        run: bun publish --access public
        working-directory: packages/skills
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "=== Dry run — packages NOT published ==="
          for pkg in packages/vite-plugin packages/runner packages/skills; do
            name=$(jq -r '.name' $pkg/package.json)
            version=$(jq -r '.version' $pkg/package.json)
            echo "  $name@$version"
          done
